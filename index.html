<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Call App</title>
  <style>
    video { width: 300px; height: 200px; margin: 10px; border-radius: 10px; }
    #videos { display: flex; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
  <h1>Room: <span id="room"></span></h1>
  <div id="videos"></div>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
  <script>
    const socket = io("https://your-backend-url.onrender.com"); // change later
    const roomId = window.location.pathname.split("/").pop();
    document.getElementById("room").textContent = roomId;

    const peers = {};
    const localVideo = document.createElement("video");
    localVideo.muted = true;
    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
      addVideo(localVideo, stream);

      socket.emit("join-room", roomId, socket.id);

      socket.on("user-connected", userId => {
        const peer = createPeer(userId, stream);
        peers[userId] = peer;
      });

      socket.on("signal", ({ from, signal }) => {
        if (!peers[from]) {
          const peer = addPeer(from, stream);
          peers[from] = peer;
        }
        peers[from].signal(signal);
      });

      socket.on("user-disconnected", userId => {
        if (peers[userId]) peers[userId].destroy();
        delete peers[userId];
      });
    });

    function createPeer(userId, stream) {
      const peer = new SimplePeer({ initiator: true, trickle: false, stream });
      peer.on("signal", signal => {
        socket.emit("signal", { to: userId, from: socket.id, signal });
      });
      peer.on("stream", userStream => {
        const video = document.createElement("video");
        addVideo(video, userStream);
      });
      return peer;
    }

    function addPeer(userId, stream) {
      const peer = new SimplePeer({ initiator: false, trickle: false, stream });
      peer.on("signal", signal => {
        socket.emit("signal", { to: userId, from: socket.id, signal });
      });
      peer.on("stream", userStream => {
        const video = document.createElement("video");
        addVideo(video, userStream);
      });
      return peer;
    }

    function addVideo(video, stream) {
      video.srcObject = stream;
      video.addEventListener("loadedmetadata", () => video.play());
      document.getElementById("videos").appendChild(video);
    }
  </script>
</body>
</html>
